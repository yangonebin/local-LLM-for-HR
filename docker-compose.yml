version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./llm:/app/llm
      - ./backend:/app/backend
      - uploads:/app/uploads
      - chroma_db:/app/chroma_db
    environment:
      - PYTHONPATH=/app/backend:/app/llm
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ./llm:/app/llm
      - ./backend:/app/backend
      - uploads:/app/uploads
    environment:
      - PYTHONPATH=/app/backend:/app/llm
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  uploads:
  chroma_db:
